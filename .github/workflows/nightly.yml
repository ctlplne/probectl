name: nightly

# U-054: the BLACK-BOX full-stack e2e (test/e2e) — real binaries, the real
# compose dependencies, public interfaces only: enroll two fixture-mode
# agents, ingest over Kafka, query /v1/topology per tenant, assert the
# tenancy boundary both ways. Nightly (not per-PR): it boots a stack and
# takes minutes; per-PR full-stack correctness stays with the integration +
# cross-tenant-isolation jobs.

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: e2e (black-box full stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: full-stack e2e (compose → binaries → ingest → API → tenancy)
        run: make e2e

  ingest-bench:
    name: ingest-bench (Sprint 14 — feeds the Sprint 17 scale baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: Consumer hot-path benchmarks
        run: go test -bench=BenchmarkIngest -benchmem -count=3 -run '^$' ./internal/pipeline/... | tee ingest-bench.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ingest-bench
          path: ingest-bench.txt

  scale-gate-m:
    name: scale-gate-m (Sprint 17 — M-profile SLO regression guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: M-profile scale gate (results + flow planes; SLO violations fail)
        run: make scale-gate-m
      - name: M-tier FULL-STACK regression (real Kafka + Prometheus)
        run: |
          docker compose -f deploy/compose/dev.yml up -d --wait kafka prometheus
          PROBECTL_SCALE_TIER=M go test -tags=integration -count=1 -v -timeout 20m \
            -run '^TestFullStackLoadGate$' ./internal/perf/
