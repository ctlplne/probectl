name: nightly

# U-054: the BLACK-BOX full-stack e2e (test/e2e) — real binaries, the real
# compose dependencies, public interfaces only: enroll two fixture-mode
# agents, ingest over Kafka, query /v1/topology per tenant, assert the
# tenancy boundary both ways. Nightly (not per-PR): it boots a stack and
# takes minutes; per-PR full-stack correctness stays with the integration +
# cross-tenant-isolation jobs.

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

# Exact patch pin, in lockstep with go.work + go.mod (`go 1.26.4` /
# `toolchain go1.26.4`, SUPPLY-007) and ci.yml's GO_VERSION. A bare "1.26" let
# setup-go resolve a different patch on the runner than the toolchain the
# modules require — the skew that broke a build job; pin the patch everywhere.
env:
  GO_VERSION: "1.26.4"

jobs:
  e2e:
    name: e2e (black-box full stack)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: full-stack e2e (compose → binaries → ingest → API → tenancy)
        run: make e2e

  discover-fuzz-targets:
    name: discover fuzz targets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: targets
        name: Build fuzz target matrix
        run: scripts/list_fuzz_targets.sh --github-output >> "$GITHUB_OUTPUT"
      - name: Log discovered fuzz targets
        run: scripts/list_fuzz_targets.sh

  fuzz:
    name: fuzz ${{ matrix.name }} (TEST-013 nightly)
    # The per-PR fuzz-smoke is seconds-long; this runs each untrusted-input
    # fuzz target for a real budget every night. TEST-003 shards by discovered
    # target, so every target gets 10m without one job trying to spend
    # target_count * 10m inside a 15m timeout.
    needs: discover-fuzz-targets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-fuzz-targets.outputs.matrix) }}
    env:
      FUZZ_NIGHTLY_FUZZTIME: "10m"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Long-budget fuzz target
        run: |
          set -euo pipefail
          echo "fuzzing ${{ matrix.pkg }} ${{ matrix.name }} (${FUZZ_NIGHTLY_FUZZTIME})"
          go test "${{ matrix.pkg }}" -run '^$' -fuzz "^${{ matrix.name }}$" -fuzztime "${FUZZ_NIGHTLY_FUZZTIME}"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: failure()
        with:
          name: fuzz-crashers
          path: "**/testdata/fuzz/**"

  ingest-bench:
    name: ingest-bench (Sprint 14 — feeds the Sprint 17 scale baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Consumer hot-path benchmarks
        run: go test -bench=BenchmarkIngest -benchmem -count=3 -run '^$' ./internal/pipeline/... | tee ingest-bench.txt
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: ingest-bench
          path: ingest-bench.txt

  scale-gate-m:
    name: scale-gate-m (Sprint 17 — M-profile SLO regression guard)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: M-profile scale gate (results + flow planes; SLO violations fail)
        run: make scale-gate-m
      - name: M-tier FULL-STACK regression (real Kafka + Prometheus + ClickHouse)
        run: |
          docker compose -f deploy/compose/dev.yml up -d --wait kafka prometheus clickhouse
          PROBECTL_SCALE_TIER=M \
          PROBECTL_FLOWSTORE_URL=http://probectl:probectl@localhost:8123 \
            go test -tags=integration -count=1 -v -timeout 20m \
            -run '^TestFullStack(Load|Flow)Gate$' ./internal/perf/
