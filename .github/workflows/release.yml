name: release

# Cut a release by pushing a semver tag: `git tag -a v0.1.0 -m "Phase 1 GA" &&
# git push origin v0.1.0`. This builds + publishes multi-arch images (with SLSA
# provenance + SBOM attestations), cross-compiled binaries + SHA-256 checksums,
# and a GitHub release. See docs/releasing.md.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release
  packages: write # push images to GHCR
  id-token: write # SLSA provenance / keyless attestation

env:
  GO_VERSION: "1.26"
  IMAGE_PREFIX: ghcr.io/imfeelingtheagi

jobs:
  images:
    name: images (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - probectl-control
          - probectl-agent
          - probectl-ebpf-agent
          - probectl-endpoint
          - probectl
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build + push multi-arch image (with provenance + SBOM)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            COMPONENT=${{ matrix.component }}
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

  binaries:
    name: binaries + checksums + release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Cross-compile release binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          for arch in amd64 arm64; do
            for b in probectl-control probectl-agent probectl-ebpf-agent probectl-endpoint probectl; do
              out="dist/${b}_${VERSION}_linux_${arch}"
              GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath \
                -ldflags "-s -w \
                  -X github.com/imfeelingtheagi/probectl/internal/version.Version=${VERSION} \
                  -X github.com/imfeelingtheagi/probectl/internal/version.Commit=${GITHUB_SHA} \
                  -X github.com/imfeelingtheagi/probectl/internal/version.Date=${DATE}" \
                -o "${out}" "./cmd/${b}"
            done
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -la dist
      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/*
