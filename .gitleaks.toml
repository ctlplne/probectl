# gitleaks config for the secret-scan CI gate (Sprint 1 / CODE-006).
#
# The scan runs against the full git graph (`gitleaks git --log-opts=--all`),
# not just the working tree at HEAD. A deleted secret is still in the repository
# history until history is rewritten, so the gate treats historical findings as
# blocking unless this file names a tightly-scoped false positive.
#
# Allowlist policy: ONLY deliberate fake secrets inside redaction/no-secrets
# TESTS (the tests exist to prove these strings get masked) and named
# false-positive patterns. Never allowlist a real credential path.

[extend]
useDefault = true

[allowlist]
description = "Deliberate test fixtures + named false positives"
paths = [
  # These tests PLANT fake secrets to prove support bundles / diagnostics
  # redact them. The strings are the test's input, not credentials.
  '''internal/control/diagnostics_test\.go''',
  '''internal/support/support_test\.go''',
  # The AI redaction test plants a dummy PEM block to prove masking.
  '''internal/ai/redact_test\.go''',
  # The AI egress-gate redactor test plants fake PII + a dummy Stripe-style
  # key (sk_live_abc123def456) to prove redactText() masks them (AIRCA-002).
  # The strings are the test's INPUT, not credentials.
  '''internal/ai/egressgate_test\.go''',
  # KEYS-003: this test plants a literal "fake" EC PRIVATE KEY PEM to prove
  # sealCAKey REFUSES a plaintext CA key (the bytes inside the block are
  # literally "fake"). The string is the test's INPUT, not a credential.
  '''internal/enroll/seal_test\.go''',
  # KEYS-001: this integration test plants a fake webhook secret, then asserts
  # the stored alert channel is envelope-sealed and never contains the raw
  # value. The string is the test's INPUT, not a credential.
  '''internal/control/alerts_integration_test\.go''',
]
regexes = [
  # gosnmp protocol constants (e.g. AuthenticationProtocol = gosnmp.SHA512)
  # trip the generic-api-key rule; they are enum identifiers, not secrets.
  '''gosnmp\.(SHA|MD5|AES|DES|NoAuth|NoPriv)[0-9A-Za-z]*''',
]

[[rules]]
id = "private-key"

[[rules.allowlists]]
description = "Historical throwaway OIDC test fixture removed by 425143b; commit+path must both match."
condition = "AND"
commits = ['''95d313bd9d706c69b513fba2e36b071b4ac3d380''']
paths = ['''internal/auth/testdata/oidc_test_key\.pem''']

[[rules]]
id = "stripe-access-token"

[[rules.allowlists]]
description = "Historical changelog mention of the dummy Stripe-style AI redaction fixture; commit+path must both match."
condition = "AND"
commits = [
  '''a78802d3ea4dcce2362eb132749b086ffea7045b''',
  '''4fa7ffba4a2e9773085d03a4bfff33a9504dbda6''',
]
paths = ['''CHANGELOG\.md''']

[[rules.allowlists]]
description = "Historical known-risks mention of the dummy Stripe-style AI redaction fixture; commit+path must both match."
condition = "AND"
commits = ['''4fa7ffba4a2e9773085d03a4bfff33a9504dbda6''']
paths = ['''docs/diligence/known-risks\.md''']
