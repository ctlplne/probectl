version: v2
# Local plugins (hermetic — no remote BSR calls), in keeping with netctl's
# air-gap / sovereignty posture. Install them with `make proto-tools`.
plugins:
  - local: protoc-gen-go
    out: internal/gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: internal/gen
    opt: paths=source_relative
