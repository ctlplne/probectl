# buf configuration for probectl's protobuf sources (gRPC services + bus messages).
#
# S0 scaffold: no .proto files exist yet. proto/agent.proto arrives in S4 and
# proto/result.proto in S6; this config and the `make proto` target are wired
# now so those sprints only add schemas. Generated Go lands in internal/gen
# (see buf.gen.yaml). Protobuf is the wire format for the bus and gRPC; JSON is
# a dev-only fallback (CLAUDE.md §4).
version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  ignore:
    # Vendored upstream schemas kept byte-wire-compatible (package names,
    # field numbers, enums as published) so probectl interoperates with the
    # real ecosystem; upstream style predates buf's STANDARD rules.
    # gnmi/gnmi_ext: openconfig/gnmi (S39 device telemetry).
    - proto/gnmi
    - proto/gnmi_ext
breaking:
  use:
    - FILE
