---
# OPS-004: defaults for the probectl.agents role. Override per inventory group.
probectl_agent_type: agent            # agent | ebpf-agent | flow-agent | device-agent | endpoint
# OPS-004: only these agent types ship an `enroll` subcommand (mTLS identity via
# the control-plane gRPC endpoint, cmd/probectl-agent/enroll.go). Every other
# type is a bus collector registered ONCE on the control plane with
# `probectl-control register-collector` — it has NO per-host enroll command, so
# the role must never run `<binary> enroll` for them.
probectl_mtls_agent_types:
  - agent
probectl_collector_plane: ""          # ebpf|flow|device for the register-collector hint; defaults from the type
probectl_version: ""                  # required: the release to install (e.g. 0.2.0)
probectl_control_grpc_addr: ""        # required: https://control-host:8443
probectl_control_api_url: ""          # required when registry heartbeat verification is enabled, e.g. https://control-host:8443
probectl_control_api_token: ""        # vault-sourced bearer token with agent.read; never logged
probectl_registry_agent_id: ""        # expected control-plane registry id for this host
probectl_registry_expected_version: "{{ probectl_version }}"
probectl_verify_registry_heartbeat: true
probectl_registry_heartbeat_freshness_seconds: 300
probectl_install_method: repo         # repo | package_url | airgap
probectl_apt_repo: "deb [signed-by=/usr/share/keyrings/probectl.gpg] https://apt.probectl.example stable main"
probectl_yum_repo_baseurl: "https://yum.probectl.example/stable"
probectl_package_url: ""              # when install_method=package_url
probectl_airgap_dir: ""               # when install_method=airgap (path to the .deb/.rpm on the host)

# Enrollment: the token is pulled from the vault at run time, NEVER written into
# the playbook or inventory. Set probectl_enroll_token via a vault lookup, e.g.
#   probectl_enroll_token: "{{ lookup('community.hashi_vault.vault_kv2_get', 'probectl/enroll').secret.token }}"
probectl_enroll_token: ""
probectl_verify_cosign: true          # SUPPLY-002: cosign-verify the package before install (package_url method; fail-closed)
# The release workflow signs keyless; these pin WHO may have signed (the probectl
# release workflow on a tag). Override only for a fork/private build pipeline.
probectl_cosign_issuer: "https://token.actions.githubusercontent.com"
probectl_cosign_identity_regexp: "^https://github.com/[^/]+/probectl/\\.github/workflows/release\\.yml@refs/tags/"
probectl_state_dir: "/var/lib/probectl-{{ probectl_agent_type }}"
