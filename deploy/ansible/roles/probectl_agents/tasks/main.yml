---
# OPS-004: install + enroll + run a probectl agent, idempotently. Re-runs are
# no-ops once the agent is installed and enrolled. The serial-batched upgrade
# play (see playbooks/upgrade.yml) drives this respecting the N/N-1 skew gate.

- name: Assert required vars
  ansible.builtin.assert:
    that:
      - probectl_agent_type in probectl_supported_agent_types
      - probectl_version | length > 0
      - probectl_control_grpc_addr | length > 0
      - not (probectl_verify_registry_heartbeat | bool) or probectl_control_api_url | length > 0
      - not (probectl_verify_registry_heartbeat | bool) or probectl_control_api_token | length > 0
      - not (probectl_verify_registry_heartbeat | bool) or probectl_registry_agent_id | length > 0
    fail_msg: >-
      probectl_version and probectl_control_grpc_addr are required. When
      probectl_verify_registry_heartbeat=true, probectl_control_api_url,
      probectl_control_api_token, and probectl_registry_agent_id are also
      required so the role can prove the tenant-scoped control-plane heartbeat.

- name: Assert bus collector identity and bus config
  when: probectl_agent_type in probectl_collector_agent_types
  ansible.builtin.assert:
    that:
      - probectl_tenant_id | length > 0
      - probectl_agent_id | length > 0
      - probectl_bus_mode in ['memory', 'kafka']
      - probectl_bus_mode != 'kafka' or probectl_bus_brokers | length > 0
      - probectl_bus_secret_source in ['env', 'vault', 'external-secret']
    fail_msg: >-
      Bus collectors (ebpf-agent, flow-agent, device-agent, endpoint) require
      a registered tenant_id, agent_id, bus mode, kafka brokers when
      probectl_bus_mode=kafka, and an explicit bus secret source before install.
      Run `probectl-control register-collector` first; do not start an
      untenant-scoped collector.

- name: Assert flow collector config inputs
  when: probectl_agent_type == 'flow-agent'
  ansible.builtin.assert:
    that:
      - (probectl_flow_netflow_enabled | bool) or (probectl_flow_ipfix_enabled | bool) or (probectl_flow_sflow_enabled | bool) or probectl_flow_cloud_import_provider | length > 0
      - probectl_flow_cloud_import_provider | length == 0 or probectl_flow_cloud_import_path | length > 0
    fail_msg: >-
      flow-agent requires at least one listener or a complete local cloud-import
      provider/path. Empty collectors fail closed before install.

- name: Assert device collector config inputs
  when: probectl_agent_type == 'device-agent'
  ansible.builtin.assert:
    that:
      - probectl_device_address | length > 0
      - probectl_device_transport in ['snmpv2c', 'snmpv3', 'gnmi']
      - probectl_device_credential | length > 0
    fail_msg: >-
      device-agent requires a target address, supported transport, and the NAME
      of a runtime credential reference. Never put the credential secret itself
      in Ansible vars or rendered YAML.

- name: Assert endpoint collector config inputs
  when: probectl_agent_type == 'endpoint'
  ansible.builtin.assert:
    that:
      - probectl_endpoint_targets | length > 0
    fail_msg: "endpoint requires at least one target URL before install."

- name: Install from the signed apt repo (Debian/Ubuntu)
  when: probectl_install_method == 'repo' and ansible_os_family == 'Debian'
  block:
    - name: Add probectl apt repo
      ansible.builtin.apt_repository:
        repo: "{{ probectl_apt_repo }}"
        state: present
    - name: Install package
      ansible.builtin.apt:
        name: "probectl-{{ probectl_agent_type }}={{ probectl_version }}*"
        state: present
        update_cache: true

- name: Install from the signed yum repo (RHEL family)
  when: probectl_install_method == 'repo' and ansible_os_family == 'RedHat'
  ansible.builtin.yum:
    name: "probectl-{{ probectl_agent_type }}-{{ probectl_version }}"
    state: present

# OPS-011: nfpm names the deb/rpm with Debian/RPM arch (amd64|arm64), but
# ansible_architecture reports the kernel arch (x86_64|aarch64). Map it before
# composing the filename, and fail closed on an arch we don't ship a package
# for rather than constructing a path that will never exist.
- name: Resolve the package arch from ansible_architecture
  when: probectl_install_method == 'airgap'
  ansible.builtin.set_fact:
    probectl_pkg_arch: >-
      {{ {'x86_64': 'amd64', 'amd64': 'amd64',
          'aarch64': 'arm64', 'arm64': 'arm64'}[ansible_architecture] | default('') }}

- name: Assert the host arch maps to a shipped package arch
  when: probectl_install_method == 'airgap'
  ansible.builtin.assert:
    that:
      - probectl_pkg_arch | length > 0
    fail_msg: >-
      No probectl package is shipped for ansible_architecture={{ ansible_architecture }}
      (shipped: x86_64->amd64, aarch64->arm64).

- name: Resolve the air-gap package path
  when: probectl_install_method == 'airgap'
  ansible.builtin.set_fact:
    probectl_airgap_pkg_path: "{{ probectl_airgap_dir }}/probectl-{{ probectl_agent_type }}_{{ probectl_version }}_{{ probectl_pkg_arch }}.deb"

# SUPPLY-001: air-gap packages are local files, so apt/yum repository metadata
# cannot protect this path. Verify the copied package's detached cosign
# signature/certificate BEFORE the package module sees it. Missing cosign,
# missing .sig/.pem, or a bad signature fails the play before install.
- name: Verify the air-gap package with cosign (fail-closed)
  when:
    - probectl_install_method == 'airgap'
    - probectl_verify_cosign | bool
  block:
    - name: Ensure cosign is available
      ansible.builtin.command: cosign version
      changed_when: false

    - name: Check local air-gap signature material
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ probectl_airgap_pkg_path }}"
        - "{{ probectl_airgap_pkg_path }}.sig"
        - "{{ probectl_airgap_pkg_path }}.pem"
      register: probectl_airgap_sig_files

    - name: Require package, signature, and certificate before install
      ansible.builtin.assert:
        that:
          - probectl_airgap_sig_files.results | selectattr('stat.exists', 'equalto', false) | list | length == 0
        fail_msg: >-
          Air-gap install requires {{ probectl_airgap_pkg_path }},
          {{ probectl_airgap_pkg_path }}.sig, and {{ probectl_airgap_pkg_path }}.pem.
          Build the bundle with scripts/airgap-bundle.sh and do not install
          unsigned privileged agent packages.

    - name: cosign verify-blob for the local air-gap package
      ansible.builtin.command:
        argv:
          - cosign
          - verify-blob
          - --certificate
          - "{{ probectl_airgap_pkg_path }}.pem"
          - --signature
          - "{{ probectl_airgap_pkg_path }}.sig"
          - --certificate-oidc-issuer
          - "{{ probectl_cosign_issuer }}"
          - --certificate-identity-regexp
          - "{{ probectl_cosign_identity_regexp }}"
          - "{{ probectl_airgap_pkg_path }}"
      changed_when: false

- name: Install from the air-gap bundle
  when: probectl_install_method == 'airgap'
  ansible.builtin.package:
    name: "{{ probectl_airgap_pkg_path }}"
    state: present

# SUPPLY-002: the package_url method downloads a release package directly and,
# when probectl_verify_cosign is true, cryptographically verifies it with cosign
# BEFORE install. Verification is fail-closed: a missing cosign, missing
# signature/cert, or a failed check aborts the play before the package is
# installed. (Previously package_url had no task block at all — selecting it
# installed nothing — and probectl_verify_cosign was referenced nowhere.)
- name: Install from a package URL
  when: probectl_install_method == 'package_url'
  block:
    - name: Assert a package URL was given
      ansible.builtin.assert:
        that: probectl_package_url | length > 0
        fail_msg: "probectl_install_method=package_url requires probectl_package_url"

    - name: Download the package
      ansible.builtin.get_url:
        url: "{{ probectl_package_url }}"
        dest: "/tmp/probectl-{{ probectl_agent_type }}-{{ probectl_version }}.pkg"
        mode: "0644"
      register: probectl_pkg

    - name: Verify the package with cosign (fail-closed)
      when: probectl_verify_cosign | bool
      block:
        - name: Ensure cosign is available
          ansible.builtin.command: cosign version
          changed_when: false

        - name: Download the cosign signature + certificate
          ansible.builtin.get_url:
            url: "{{ probectl_package_url }}{{ item.suffix }}"
            dest: "{{ probectl_pkg.dest }}{{ item.suffix }}"
            mode: "0644"
          loop:
            - { suffix: ".sig" }
            - { suffix: ".pem" }

        - name: cosign verify-blob (pinned to the probectl release identity)
          ansible.builtin.command:
            argv:
              - cosign
              - verify-blob
              - --certificate
              - "{{ probectl_pkg.dest }}.pem"
              - --signature
              - "{{ probectl_pkg.dest }}.sig"
              - --certificate-oidc-issuer
              - "{{ probectl_cosign_issuer }}"
              - --certificate-identity-regexp
              - "{{ probectl_cosign_identity_regexp }}"
              - "{{ probectl_pkg.dest }}"
          changed_when: false
          # A non-zero exit (tampered/unsigned package) fails the play here,
          # before the install task below runs — the package is never installed.

    - name: Install the (verified) package
      ansible.builtin.package:
        name: "{{ probectl_pkg.dest }}"
        state: present

- name: Template the agent config
  ansible.builtin.template:
    src: "{{ probectl_agent_type }}.yaml.j2"
    dest: "/etc/probectl/{{ probectl_agent_type }}.yaml"
    owner: probectl
    group: probectl
    mode: "0640"
  notify: restart probectl agent

- name: Check whether the mTLS agent already has an identity
  when: probectl_agent_type in probectl_mtls_agent_types
  ansible.builtin.stat:
    path: "{{ probectl_state_dir }}/identity/agent.crt"
  register: probectl_identity

# OPS-004: only the canary `agent` ships an `enroll` subcommand — it mints an
# mTLS identity by redeeming a one-time token against the control-plane gRPC
# endpoint (cmd/probectl-agent/enroll.go). The bus collectors (ebpf-agent,
# flow-agent, device-agent, endpoint) have NO per-host enroll command: they are
# registered ONCE on the control plane with `probectl-control register-collector`
# (cmd/probectl-control/enroll.go), which mints a tenant_id/agent_id the
# collector stamps on the records it publishes to the bus — no certificate is
# issued. Running `<binary> enroll` for those types would fail (unknown
# subcommand). So the enroll task is gated to the mTLS `agent` only; collectors
# get a one-time guidance message instead.
- name: Enroll the mTLS canary agent (one-time; token from vault, never persisted)
  when:
    - probectl_agent_type in probectl_mtls_agent_types
    - not probectl_identity.stat.exists
    - probectl_enroll_token | length > 0
  ansible.builtin.command:
    cmd: >-
      /usr/bin/probectl-{{ probectl_agent_type }} enroll
      --server {{ probectl_control_grpc_addr }}
      --token {{ probectl_enroll_token }}
      --dir {{ probectl_state_dir }}/identity
  no_log: true   # the token must never reach the Ansible log
  notify: restart probectl agent

- name: Remind operator how bus collectors register (no per-host enroll)
  when: probectl_agent_type not in probectl_mtls_agent_types
  ansible.builtin.debug:
    msg: >-
      probectl-{{ probectl_agent_type }} is a bus collector and has no `enroll`
      subcommand. Register it ONCE on the control plane with:
      `probectl-control register-collector --token <pjt_...> --plane {{ probectl_collector_plane | default(probectl_agent_type | regex_replace('-agent$', '')) }} --hostname {{ inventory_hostname }}`,
      then set the minted tenant_id/agent_id in /etc/probectl/{{ probectl_agent_type }}.yaml.

- name: Capture the earliest acceptable registry heartbeat time
  when: probectl_verify_registry_heartbeat | bool
  ansible.builtin.set_fact:
    probectl_registry_verify_after: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}"

- name: Enable + start the agent
  ansible.builtin.systemd:
    name: "probectl-{{ probectl_agent_type }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Verify local agent service liveness
  ansible.builtin.command:
    cmd: "systemctl is-active probectl-{{ probectl_agent_type }}"
  register: probectl_active
  changed_when: false
  failed_when: probectl_active.stdout != "active"

- name: Read the tenant-scoped agent registry heartbeat
  when: probectl_verify_registry_heartbeat | bool
  ansible.builtin.uri:
    url: "{{ probectl_control_api_url | regex_replace('/+$', '') }}/v1/agents/{{ probectl_registry_agent_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ probectl_control_api_token }}"
      Accept: "application/json"
    return_content: true
    status_code: 200
    validate_certs: true
  register: probectl_registry_agent
  changed_when: false
  no_log: true
  until:
    - probectl_registry_agent.status == 200
    - (probectl_registry_agent.json.id | default('')) == probectl_registry_agent_id
    - (probectl_registry_agent.json.agent_version | default('')) == probectl_registry_expected_version
    - (probectl_registry_agent.json.status | default('')) == "online"
    - probectl_registry_agent.json.last_seen_at is defined
    - (probectl_registry_agent.json.last_seen_at | default('') | regex_replace('\\.[0-9]+', '')) >= probectl_registry_verify_after
  retries: "{{ [((probectl_registry_heartbeat_freshness_seconds | int) // 5), 1] | max }}"
  delay: 5

- name: Confirm control-plane registry heartbeat evidence
  when: probectl_verify_registry_heartbeat | bool
  ansible.builtin.debug:
    msg: >-
      control-plane registry confirmed probectl-{{ probectl_agent_type }}
      id={{ probectl_registry_agent_id }} version={{ probectl_registry_expected_version }}
      with a fresh tenant-scoped heartbeat after {{ probectl_registry_verify_after }}.
  changed_when: false
