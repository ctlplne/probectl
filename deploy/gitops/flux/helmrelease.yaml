# Flux HelmRelease for probectl (S35). Reconciles the chart from the GitRepository.
# Secrets are referenced via secrets.existingSecret (manage the Secret with Sealed
# Secrets / External Secrets Operator), never inlined here.
# Required keys: PROBECTL_ENVELOPE_KEY, PROBECTL_SESSION_HMAC_KEY,
# PROBECTL_DATABASE_URL, and optionally PROBECTL_OIDC_CLIENT_SECRET.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: probectl
  namespace: probectl
spec:
  interval: 10m
  releaseName: probectl
  chart:
    spec:
      chart: deploy/helm/probectl
      sourceRef:
        kind: GitRepository
        name: probectl
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  # Merge the sizing profile + your overrides. The values below are the minimum;
  # to use a full size preset, copy values-medium.yaml here or reference it via
  # valuesFrom a ConfigMap.
  values:
    replicaCount: 3
    podDisruptionBudget:
      enabled: true
      minAvailable: 2
    ingress:
      host: probectl.example.com
      tlsSecretName: probectl-tls
    secrets:
      existingSecret: probectl-secrets
