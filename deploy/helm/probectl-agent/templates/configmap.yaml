apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "probectl-agent.fullname" . }}
  labels:
    {{- include "probectl-agent.labels" . | nindent 4 }}
data:
  ebpf-agent.yaml: |
    tenant_id: {{ required "tenantID is required" .Values.tenantID | quote }}
    {{- if and .Values.health.enabled (eq .Values.health.mode "exec") }}
    health_state_dir: {{ required "health.stateDir is required when health.mode=exec" .Values.health.stateDir | quote }} # WIRE-004: exec probes; no plaintext listener
    {{- else if and .Values.health.enabled (eq .Values.health.mode "http") }}
    health_addr: ":{{ .Values.health.port }}" # compatibility-only HTTP probes; gated in DaemonSet template
    {{- end }}
    bus:
      mode: {{ .Values.bus.mode | quote }}
      {{- with .Values.bus.brokers }}
      brokers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- if .Values.l7Capture.enabled }}
    {{- if not .Values.l7Capture.scope }}
    {{- fail "l7Capture.scope is required when l7Capture.enabled=true; host-wide TLS plaintext capture is not expressible" }}
    {{- end }}
    # U-003/EBPF-002: requires enable + consent + explicit workload scope.
    l7_capture_enabled: true
    l7_capture_consent_tenant: {{ required "l7Capture.consentTenant is required when l7Capture.enabled=true" .Values.l7Capture.consentTenant | quote }}
    l7_capture_scope:
{{ toYaml .Values.l7Capture.scope | nindent 6 }}
    l7_capture_redaction: {{ .Values.l7Capture.redaction | quote }}
    l7_capture_kernel_window: {{ .Values.l7Capture.kernelWindow }}
    {{- end }}
