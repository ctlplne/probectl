{{- $tenant := required "tenantID is required — every flow is tenant-bound (guardrail 1)" .Values.tenantID -}}
{{- if and (eq .Values.bus.mode "kafka") (not .Values.bus.brokers) -}}
{{- fail "bus.brokers is required for kafka mode" -}}
{{- end -}}
{{- if and (eq .Values.bus.mode "kafka") (not .Values.bus.tls.enabled) (not .Values.bus.allowPlaintext) -}}
{{- fail "plaintext kafka refused (U-010): enable bus.tls (bus.tls.existingSecret) or set the explicit dev-only bus.allowPlaintext=true" -}}
{{- end -}}
{{- $imageTag := (.Values.image.tag | default .Chart.AppVersion) -}}
{{- if and (not .Values.image.allowTagOnly) (not (regexMatch "@sha256:[a-fA-F0-9]{64}$" $imageTag)) -}}
{{- fail "privileged eBPF agent image must be digest-pinned: set image.tag='<version>@sha256:<digest>' or explicitly break glass with image.allowTagOnly=true" -}}
{{- end -}}
{{- if and .Values.health.enabled (not (or (eq .Values.health.mode "exec") (eq .Values.health.mode "http"))) -}}
{{- fail "health.mode must be exec or http" -}}
{{- end -}}
{{- if and .Values.health.enabled (eq .Values.health.mode "http") (not .Values.health.allowPlaintextHTTP) -}}
{{- fail "health.mode=http opens a plaintext pod listener; keep health.mode=exec or set health.allowPlaintextHTTP=true as an explicit compatibility acknowledgement" -}}
{{- end -}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "probectl-agent.fullname" . }}
  labels:
    {{- include "probectl-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "probectl-agent.selectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "probectl-agent.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "probectl-agent.fullname" . }}
      automountServiceAccountToken: false
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        seccompProfile:
          type: {{ .Values.seccomp.type }}
          {{- if eq .Values.seccomp.type "Localhost" }}
          localhostProfile: {{ .Values.seccomp.localhostProfile }}
          {{- end }}
      {{- if and (eq .Values.seccomp.type "Localhost") .Values.seccomp.installProfile }}
      # EBPF-003: install the strict default-deny profile onto this node's
      # kubelet seccomp root BEFORE the agent starts, so the Localhost profile
      # resolves with no manual node bootstrap. The initContainer is the only
      # thing that needs the hostPath write; the agent itself does not mount it.
      initContainers:
        - name: install-seccomp-profile
          image: {{ .Values.seccomp.installerImage | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              dest="$(dirname "/host-seccomp/{{ .Values.seccomp.localhostProfile }}")"
              mkdir -p "$dest"
              cp /profile/seccomp.json "/host-seccomp/{{ .Values.seccomp.localhostProfile }}"
              echo "installed strict seccomp profile to {{ .Values.seccomp.kubeletSeccompRoot }}/{{ .Values.seccomp.localhostProfile }}"
          securityContext:
            runAsUser: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["DAC_OVERRIDE", "CHOWN", "FOWNER"] # write under the kubelet dir
          volumeMounts:
            - name: seccomp-profile
              mountPath: /profile
              readOnly: true
            - name: kubelet-seccomp
              mountPath: /host-seccomp
      {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ $imageTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/etc/probectl/ebpf-agent.yaml"]
          {{- if and .Values.health.enabled (eq .Values.health.mode "http") }}
          ports:
            - name: health
              containerPort: {{ .Values.health.port }}
          # OPS-001 compatibility mode: liveness restarts a dead agent; readiness depools a
          # not-yet-attached one (stuck CAP_PERFMON / kernel lockdown shows
          # up instead of a silently-dead pod). WIRE-004 keeps this off by default.
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- else if and .Values.health.enabled (eq .Values.health.mode "exec") }}
          # OPS-001/WIRE-004: liveness/readiness without opening a plaintext
          # listener. The agent writes state files in health.stateDir; the same
          # binary checks freshness and status.
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/app
                - healthcheck
                - --state-dir
                - {{ required "health.stateDir is required when health.mode=exec" .Values.health.stateDir | quote }}
                - --live
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            exec:
              command:
                - /usr/local/bin/app
                - healthcheck
                - --state-dir
                - {{ required "health.stateDir is required when health.mode=exec" .Values.health.stateDir | quote }}
                - --ready
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          securityContext:
            # The loader needs its capabilities EFFECTIVE: Kubernetes grants
            # added capabilities to uid 0 only (no ambient-cap support), so
            # the container runs as root with everything dropped except the
            # documented minimal set (deploy/agent/README.md). The VM systemd
            # unit runs fully non-root via ambient capabilities instead.
            runAsUser: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              {{- if eq .Values.capabilityMode "legacy" }}
              {{- if ne .Values.legacyKernelRingBufferAck "i-confirm-runtime-ring-buffer-support" }}
              {{- fail "capabilityMode=legacy grants CAP_SYS_ADMIN and requires legacyKernelRingBufferAck=i-confirm-runtime-ring-buffer-support after the runtime probe confirms BTF + BPF ring-buffer support; generic <5.8 kernels are unsupported" }}
              {{- end }}
              add: ["SYS_ADMIN"] # explicit break-glass only; runtime still requires BTF + BPF ring buffer
              {{- else }}
              add: ["BPF", "PERFMON"] # kernels >= 5.8 — the minimal pair
              {{- end }}
          env:
            - name: PROBECTL_EBPF_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: PROBECTL_EBPF_LOG_FORMAT
              value: {{ .Values.logFormat | quote }}
            {{- if .Values.bus.tls.enabled }}
            - name: PROBECTL_EBPF_BUS_TLS_ENABLED
              value: "true"
            {{- if .Values.bus.tls.existingSecret }}
            - name: PROBECTL_EBPF_BUS_TLS_CA_FILE
              value: /etc/probectl/bus-tls/ca.crt
            {{- end }}
            {{- end }}
            {{- if .Values.bus.allowPlaintext }}
            - name: PROBECTL_EBPF_BUS_ALLOW_PLAINTEXT
              value: "true" # dev-only (U-010)
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/probectl
              readOnly: true
            - name: btf
              mountPath: /sys/kernel/btf/vmlinux
              readOnly: true
            {{- if and .Values.bus.tls.enabled .Values.bus.tls.existingSecret }}
            - name: bus-tls
              mountPath: /etc/probectl/bus-tls
              readOnly: true
            {{- end }}
            {{- if and .Values.health.enabled (eq .Values.health.mode "exec") }}
            - name: health-state
              mountPath: {{ required "health.stateDir is required when health.mode=exec" .Values.health.stateDir | quote }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "probectl-agent.fullname" . }}
        {{- if and (eq .Values.seccomp.type "Localhost") .Values.seccomp.installProfile }}
        # EBPF-003: the bundled strict profile + the node kubelet seccomp root,
        # used only by the install-seccomp-profile initContainer.
        - name: seccomp-profile
          configMap:
            name: {{ include "probectl-agent.fullname" . }}-seccomp
        - name: kubelet-seccomp
          hostPath:
            path: {{ .Values.seccomp.kubeletSeccompRoot }}
            type: DirectoryOrCreate
        {{- end }}
        # CO-RE relocation source: the running kernel's BTF (read-only).
        - name: btf
          hostPath:
            path: /sys/kernel/btf/vmlinux
            type: File
        {{- if and .Values.health.enabled (eq .Values.health.mode "exec") }}
        # WIRE-004: writable state for exec health probes; avoids a plaintext
        # pod listener while the root filesystem stays read-only.
        - name: health-state
          emptyDir: {}
        {{- end }}
        {{- if and .Values.bus.tls.enabled .Values.bus.tls.existingSecret }}
        - name: bus-tls
          secret:
            secretName: {{ .Values.bus.tls.existingSecret }}
        {{- end }}
