# probectl-agent (eBPF host agent) — secure-by-default DaemonSet values.
# The privilege contract is documented in deploy/agent/README.md (U-052) and
# docs/ebpf-agent.md; this chart declares it explicitly (U-016).

image:
  repository: ghcr.io/imfeelingtheagi/probectl-ebpf-agent
  # REQUIRED for this privileged DaemonSet: pin the release tag AND digest,
  # e.g. tag: "0.4.0@sha256:<64 hex chars>". The chart refuses tag-only images
  # unless image.allowTagOnly=true is set as an explicit break-glass.
  tag: ""
  allowTagOnly: false
  pullPolicy: IfNotPresent

# SUPPLY-001: privileged eBPF-agent installs render the cluster-side verifier by
# default, not as a separate optional manifest the operator may forget. Kyverno
# must already be installed in the cluster; disabling this policy requires an
# explicit accepted-risk note and is intended only for dev or a replacement
# admission controller with equivalent keyless cosign checks.
admission:
  imageIntegrity:
    enabled: true
    acceptedRisk: ""
    policyName: probectl-agent-image-integrity
    # Enforce is the regulated/default posture. Audit is allowed only when the
    # template also receives acceptedRisk naming the replacement control or
    # approved dev exception.
    validationFailureAction: Enforce
    background: false
    imageReferences:
      - ghcr.io/imfeelingtheagi/probectl-ebpf-agent*
    issuer: https://token.actions.githubusercontent.com
    subjectRegExp: ^https://github.com/imfeelingtheagi/probectl/\.github/workflows/release\.yml@refs/tags/.*

# REQUIRED: the tenant every flow from these nodes belongs to (guardrail 1).
tenantID: ""

bus:
  # kafka is the production mode. The agent REFUSES plaintext kafka unless
  # allowPlaintext is set (U-010).
  mode: kafka
  brokers: []  # REQUIRED for kafka mode, e.g. ["kafka.probectl.svc:9093"]
  tls:
    enabled: true
    # Secret with ca.crt (+ optional tls.crt/tls.key for mTLS to the bus).
    existingSecret: ""
  # Dev-only escape hatch: lab clusters without bus TLS must opt in
  # EXPLICITLY; production kafka requires TLS.
  allowPlaintext: false

# TLS-plaintext L7 capture stays OFF unless enable, per-tenant consent naming
# this agent's tenant, and explicit workload scope are all set (U-003/EBPF-002).
l7Capture:
  enabled: false
  consentTenant: ""
  # Scope entries: pid:<n>, exe:/abs/path, or cgroup:/abs/cgroup-dir.
  # Host-wide capture is not expressible; the template fails when enabled
  # without at least one scoped workload.
  scope: []
  # headers = keep protocol metadata but zero bodies + secret-bearing header
  # values; length = no payload bytes; full = consented debugging only.
  redaction: headers
  # Max plaintext bytes/chunk that may transit the kernel ring in headers mode.
  # 0 lets the agent default to 1024; valid explicit range is 128..4095.
  kernelWindow: 1024

# Kernel capability matrix (deploy/agent/README.md):
#   modern — kernels >= 5.8: CAP_BPF + CAP_PERFMON (the minimal pair).
#   legacy — explicit break-glass: CAP_SYS_ADMIN only when the runtime probe
#     can still prove BTF + BPF ring buffer support but the cluster cannot
#     grant the split CAP_BPF/CAP_PERFMON pair. Generic <5.8 kernels remain
#     unsupported because the agent requires BPF ring-buffer support.
capabilityMode: modern
legacyKernelRingBufferAck: ""

seccomp:
  # EBPF-003: this is a PRIVILEGED, kernel-touching agent, so the strict
  # default-deny profile (U-052) is the DEFAULT — parity with the deb/rpm
  # systemd unit's SystemCallFilter. The chart installs the profile onto each
  # node itself (installProfile, below) so Localhost works out of the box with
  # no manual node bootstrap.
  #
  # Set type: RuntimeDefault for the portable baseline (e.g. managed clusters
  # that forbid hostPath installs or pin a node-managed profile).
  type: Localhost
  localhostProfile: probectl/seccomp.json
  # installProfile runs a privileged initContainer (per node, via the
  # DaemonSet) that writes the bundled profile to the kubelet seccomp root
  # before the agent starts. Disable it if your nodes already ship the profile
  # or you manage seccomp out-of-band.
  installProfile: true
  # kubeletSeccompRoot is the node directory the kubelet resolves Localhost
  # profiles against; localhostProfile is relative to it.
  kubeletSeccompRoot: /var/lib/kubelet/seccomp
  # installerImage copies the profile in (busybox-class; any image with /bin/sh
  # + cp). Pinned by the operator for air-gapped/regulated installs.
  installerImage: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

logLevel: info
logFormat: json

nodeSelector:
  kubernetes.io/os: linux
tolerations: []
priorityClassName: ""

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 10%

# OPS-001: liveness/readiness probe server. The DaemonSet wires httpGet
# probes to /healthz (process up) and /readyz (flow source attached +
# streaming) on this port. Disable only for a no-orchestrator run.
health:
  enabled: true
  port: 9090
