apiVersion: v2
name: probectl
description: >-
  Self-hosted, multi-tenant, OpenTelemetry-native network observability control
  plane. HTTPS-by-default (TLS-terminating ingress + HSTS; no plaintext API
  exposure). Ships single-tenant and multi-tenant/provider reference values.
type: application
# Chart version (independent of the app). Bump on chart changes.
version: 0.4.0
# The default probectl version this chart targets; override image.tag to pin.
# OPS-008: this MUST equal the repo-root VERSION file (the single source of
# version truth) and the compose image pin — enforced by the version-consistency
# gate (cmd/probectl-control/version_consistency_test.go + scripts/check_version_consistency.sh).
appVersion: "0.4.0"
keywords:
  - observability
  - network
  - opentelemetry
  - multi-tenant
home: https://github.com/imfeelingtheagi/probectl
sources:
  - https://github.com/imfeelingtheagi/probectl
maintainers:
  - name: probectl
