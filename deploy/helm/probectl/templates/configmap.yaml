apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "probectl.fullname" . }}-config
  labels:
    {{- include "probectl.labels" . | nindent 4 }}
data:
  PROBECTL_HTTP_ADDR: ":8080"
  PROBECTL_HSTS_ENABLED: "true"
  PROBECTL_LOG_FORMAT: {{ .Values.control.logFormat | quote }}
  PROBECTL_LOG_LEVEL: {{ .Values.control.logLevel | quote }}
  PROBECTL_AUTH_MODE: {{ .Values.control.authMode | quote }}
  PROBECTL_SECURITY_CONTACT: {{ .Values.control.securityContact | quote }}
  {{- if .Values.oidc.issuer }}
  PROBECTL_OIDC_ISSUER: {{ .Values.oidc.issuer | quote }}
  PROBECTL_OIDC_CLIENT_ID: {{ .Values.oidc.clientId | quote }}
  PROBECTL_OIDC_REDIRECT_URL: {{ .Values.oidc.redirectUrl | quote }}
  {{- end }}
  {{- range $k, $v := .Values.control.extraEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
