apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "probectl.fullname" . }}-config
  labels:
    {{- include "probectl.labels" . | nindent 4 }}
data:
  # Fail closed (TENANT-106/SEC-002): never silently write plaintext at rest.
  PROBECTL_REQUIRE_AT_REST_ENCRYPTION: {{ .Values.requireAtRestEncryption | default true | quote }}
  # SEC-009: the chart fronts the app with a TLS-terminating ingress, so the
  # browser-facing edge is HTTPS — cookies carry Secure even though the app
  # listener behind the ingress is plaintext.
  PROBECTL_PUBLIC_TLS: {{ .Values.publicTLS | default true | quote }}
  # WIRE-004: the in-cluster listener is plaintext BEHIND the TLS-terminating
  # ingress — the explicit, loud opt-in (TLS is the binary's default).
  PROBECTL_ALLOW_PLAINTEXT_HTTP: {{ .Values.allowPlaintextHTTP | default true | quote }}
  PROBECTL_HTTP_ADDR: ":8080"
  PROBECTL_HSTS_ENABLED: "true"
  PROBECTL_LOG_FORMAT: {{ .Values.control.logFormat | quote }}
  PROBECTL_LOG_LEVEL: {{ .Values.control.logLevel | quote }}
  PROBECTL_AUTH_MODE: {{ .Values.control.authMode | quote }}
  PROBECTL_SECURITY_CONTACT: {{ .Values.control.securityContact | quote }}
  {{- if .Values.oidc.issuer }}
  PROBECTL_OIDC_ISSUER: {{ .Values.oidc.issuer | quote }}
  PROBECTL_OIDC_CLIENT_ID: {{ .Values.oidc.clientId | quote }}
  PROBECTL_OIDC_REDIRECT_URL: {{ .Values.oidc.redirectUrl | quote }}
  {{- end }}
  {{- range $k, $v := .Values.control.extraEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
