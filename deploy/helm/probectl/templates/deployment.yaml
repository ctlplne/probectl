apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "probectl.fullname" . }}
  labels:
    {{- include "probectl.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "probectl.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "probectl.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pods when non-secret config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "probectl.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.migrateOnBoot }}
      initContainers:
        - name: migrate
          image: {{ include "probectl.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["migrate"]
          envFrom:
            - configMapRef:
                name: {{ include "probectl.fullname" . }}-config
            - secretRef:
                name: {{ include "probectl.secretName" . }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.control.tls.enabled }}
          volumeMounts:
            - name: control-tls
              mountPath: {{ .Values.control.tls.mountPath | quote }}
              readOnly: true
          {{- end }}
      {{- end }}
      containers:
        - name: control
          image: {{ include "probectl.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          ports:
            - name: {{ include "probectl.servicePortName" . }}
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "probectl.fullname" . }}-config
            - secretRef:
                name: {{ include "probectl.secretName" . }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ include "probectl.servicePortName" . }}
              scheme: {{ include "probectl.probeScheme" . }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ include "probectl.servicePortName" . }}
              scheme: {{ include "probectl.probeScheme" . }}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.control.tls.enabled }}
          volumeMounts:
            - name: control-tls
              mountPath: {{ .Values.control.tls.mountPath | quote }}
              readOnly: true
          {{- end }}
      {{- if .Values.control.tls.enabled }}
      volumes:
        - name: control-tls
          secret:
            secretName: {{ required "control.tls.existingSecret is required when control.tls.enabled=true" .Values.control.tls.existingSecret | quote }}
            items:
              - key: {{ .Values.control.tls.certKey | quote }}
                path: tls.crt
              - key: {{ .Values.control.tls.keyKey | quote }}
                path: tls.key
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
