{{- if .Values.networkPolicy.enabled }}
{{- if empty .Values.networkPolicy.ingressFrom }}
{{- fail "networkPolicy.ingressFrom must name at least one ingress-controller source when networkPolicy.enabled=true (WIRE-002: do not expose plaintext in-cluster API broadly)" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "probectl.fullname" . }}
  labels:
    {{- include "probectl.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "probectl.selectorLabels" . | nindent 6 }}
  # Default-deny: selecting both policy types with the rules below means anything
  # not explicitly allowed is dropped.
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
      {{- with .Values.networkPolicy.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  egress:
    # DNS is always required (cluster service discovery).
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.egressTo }}
    {{- toYaml . | nindent 4 }}
    {{- else }}
    # No explicit egress allow-list configured ⇒ permit all other egress (the
    # datastores/bus/IdP/feeds are reachable). Tighten this in production by
    # setting networkPolicy.egressTo.
    - {}
    {{- end }}
{{- end }}
