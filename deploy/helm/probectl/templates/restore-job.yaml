{{- if .Values.restore.enabled }}
{{- $restoreBackupFile := required "restore.backupFile is required when restore.enabled=true" .Values.restore.backupFile }}
# OPS-007: parameterized restore Job for Kubernetes, mirroring the compose
# restore scripts (verify checksum → backup-open to ephemeral workdir → drop →
# restore → migrate → readyz).
# It is a one-shot Job (NOT a CronJob): an operator sets restore.enabled=true
# and restore.backupFile to the sealed dump on the backups PVC, applies, and
# deletes it after. Drilled on kind in CI (the backup-drill job) so the path
# can't silently rot. See docs/ops/backup-restore.md.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "probectl.fullname" . }}-restore
  labels:
    {{- include "probectl.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook-weight": "0"
spec:
  backoffLimit: 0   # a restore must not silently retry-and-clobber; fail loud
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
      initContainers:
        # Stage the control-plane binary so backup-open can decrypt the sealed
        # dump into the restore-only emptyDir after checksum verification —
        # plaintext never lands on the backups PVC (OPS-002 symmetry).
        - name: stage-probectl
          image: {{ include "probectl.image" . }}
          # The control-plane image installs its single static binary at
          # /usr/local/bin/app (deploy/docker/Dockerfile); stage it under a
          # stable name the restore container invokes.
          command: ["/bin/sh", "-c", "cp /usr/local/bin/app /shared/probectl-control"]
          volumeMounts:
            - { name: shared, mountPath: /shared }
      containers:
        - name: restore
          {{- /* SUPPLY-006: default to the SAME digest-pinned ref as the backup
             CronJob (values.yaml backup.postgres.image), never a tag-only
             postgres:16 — a mutable tag drifts the restore tool out from under a
             sealed dump. An operator override is still honoured. */}}
          image: {{ .Values.restore.image | default .Values.backup.postgres.image }}
          command: ["/bin/sh", "-ec"]
          args:
            - |
              echo "restore: verifying backup is readable…"
              backup_file="{{ $restoreBackupFile }}"
              backup="/backups/${backup_file}"
              sha="${backup}.sha256"
              work="/restore-work/postgres.dump"
              trap 'rm -f "${work}"' EXIT
              test -s "${backup}"
              test -s "${sha}"
              (cd /backups && sha256sum -c "${backup_file}.sha256" >/dev/null)
              echo "restore: checksum verified"
              echo "restore: decrypting into an ephemeral work volume…"
              # backup-open is a stdin→stdout decryption filter; it takes the KEK
              # from PROBECTL_ENVELOPE_KEY (env, below) — it has NO --in/--out flags.
              /shared/probectl-control backup-open < "${backup}" > "${work}"
              test -s "${work}"
              echo "restore: restoring into {{ .Values.restore.database }}…"
              pg_restore --clean --if-exists --no-owner \
                -h "{{ .Values.restore.host }}" -U "$PGUSER" -d "{{ .Values.restore.database }}" \
                "${work}"
              echo "restore: applying migrations (idempotent)…"
              /shared/probectl-control migrate
              echo "restore: done. Verify /readyz on the control plane before resuming traffic."
          env:
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: {{ .Values.backup.credentialsSecret }}, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.backup.credentialsSecret }}, key: password } }
            - name: PROBECTL_DATABASE_URL
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.existingSecret | default (printf "%s-secrets" (include "probectl.fullname" .)) }}, key: PROBECTL_DATABASE_URL } }
            - name: PROBECTL_ENVELOPE_KEY
              valueFrom: { secretKeyRef: { name: {{ .Values.backup.encryption.keySecret }}, key: {{ .Values.backup.encryption.keySecretKey }} } }
          volumeMounts:
            - { name: backups, mountPath: /backups, readOnly: true }
            - { name: shared, mountPath: /shared }
            - { name: restore-work, mountPath: /restore-work }
      volumes:
        - name: backups
          persistentVolumeClaim:
            claimName: {{ .Values.backup.persistence.claimName | default (printf "%s-backups" (include "probectl.fullname" .)) }}
        - name: shared
          emptyDir: {}
        - name: restore-work
          emptyDir: {}
{{- end }}
{{- if .Values.restore.clickhouse.enabled }}
---
# OPS-007 / RESIL-001: chart-managed ClickHouse restore Job, mirroring the CH
# backup CronJob. RESTORE runs SERVER-SIDE: the path below is read by the
# ClickHouse server, not by this Kubernetes Job pod. That is why this pod does
# not mount the backups PVC; mounting it here would verify the wrong
# filesystem. The CH server backups volume is encrypted at rest,
# docs/hardening.md §0c.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "probectl.fullname" . }}-clickhouse-restore
  labels:
    {{- include "probectl.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook-weight": "0"
spec:
  backoffLimit: 0   # a restore must not silently retry-and-clobber; fail loud
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # the clickhouse image's clickhouse uid
      containers:
        - name: ch-restore
          image: {{ .Values.restore.clickhouse.image | default .Values.backup.clickhouse.image | quote }}
          command: ["/bin/sh", "-ec"]
          args:
            - |
              server_backup_path="{{ required "restore.clickhouse.serverBackupPath is required" .Values.restore.clickhouse.serverBackupPath }}"
              backup_file="{{ required "restore.clickhouse.backupFile is required" .Values.restore.clickhouse.backupFile }}"
              echo "ch-restore: ClickHouse server {{ .Values.restore.clickhouse.host }} must already see ${server_backup_path}/${backup_file}"
              echo "ch-restore: dropping + restoring {{ .Values.restore.clickhouse.database }} (DESTRUCTIVE)…"
              clickhouse-client --host "{{ .Values.restore.clickhouse.host }}" \
                --user "$CH_USER" --password "$CH_PASSWORD" \
                --query "DROP DATABASE IF EXISTS {{ .Values.restore.clickhouse.database }} SYNC"
              clickhouse-client --host "{{ .Values.restore.clickhouse.host }}" \
                --user "$CH_USER" --password "$CH_PASSWORD" \
                --query "RESTORE DATABASE {{ .Values.restore.clickhouse.database }} FROM File('${server_backup_path}/${backup_file}')"
              echo "ch-restore: done. Verify /readyz on the control plane before resuming traffic."
          env:
            - name: CH_USER
              valueFrom: { secretKeyRef: { name: {{ .Values.backup.credentialsSecret }}, key: ch-username } }
            - name: CH_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.backup.credentialsSecret }}, key: ch-password } }
{{- end }}
