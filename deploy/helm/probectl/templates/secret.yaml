{{- if not .Values.secrets.existingSecret }}
{{- if not .Values.secrets.envelopeKey }}
{{- fail "secrets.envelopeKey is required (base64 32-byte KEK) unless secrets.existingSecret is set" }}
{{- end }}
{{- if not .Values.secrets.sessionHMACKey }}
{{- fail "secrets.sessionHMACKey is required (hex 32-byte session HMAC key) unless secrets.existingSecret is set" }}
{{- end }}
{{- if not (regexMatch "^[0-9a-fA-F]{64}$" .Values.secrets.sessionHMACKey) }}
{{- fail "secrets.sessionHMACKey must be exactly 64 hex characters (openssl rand -hex 32)" }}
{{- end }}
{{- if not .Values.database.url }}
{{- fail "database.url is required (full Postgres DSN) unless secrets.existingSecret is set — no default credential ships (OPS-001)" }}
{{- end }}
{{- if contains "probectl:probectl@" .Values.database.url }}
{{- fail "database.url ships the dev credential probectl:probectl — set a real DSN with a strong password (OPS-001, fail closed)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "probectl.fullname" . }}-secrets
  labels:
    {{- include "probectl.labels" . | nindent 4 }}
type: Opaque
stringData:
  PROBECTL_ENVELOPE_KEY: {{ .Values.secrets.envelopeKey | quote }}
  PROBECTL_SESSION_HMAC_KEY: {{ .Values.secrets.sessionHMACKey | quote }}
  PROBECTL_DATABASE_URL: {{ .Values.database.url | quote }}
  {{- if .Values.oidc.clientSecret }}
  PROBECTL_OIDC_CLIENT_SECRET: {{ .Values.oidc.clientSecret | quote }}
  {{- end }}
{{- end }}
