apiVersion: v1
kind: Service
metadata:
  name: {{ include "probectl.fullname" . }}
  labels:
    {{- include "probectl.labels" . | nindent 4 }}
spec:
  # ClusterIP by default: the API is reachable externally ONLY through the
  # TLS-terminating ingress (no plaintext NodePort/LoadBalancer).
  type: {{ .Values.service.type }}
  selector:
    {{- include "probectl.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
