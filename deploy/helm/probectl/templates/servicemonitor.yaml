{{- if .Values.metrics.serviceMonitor.enabled }}
# OPS-005: scrape probectl's /metrics with the Prometheus Operator. The
# endpoint is self-metrics only (no tenant data), so a plain scrape is safe;
# the strict NetworkPolicy profile scopes WHICH namespace may reach the port.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "probectl.fullname" . }}
  labels:
    {{- include "probectl.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "probectl.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      scheme: {{ .Values.metrics.serviceMonitor.scheme }}
      {{- with .Values.metrics.serviceMonitor.tlsConfig }}
      tlsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
