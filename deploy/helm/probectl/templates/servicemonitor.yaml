{{- if .Values.metrics.serviceMonitor.enabled }}
{{- if ne .Values.metrics.serviceMonitor.scheme (include "probectl.serviceScheme" .) }}
{{- fail "metrics.serviceMonitor.scheme must match the rendered control listener transport (set control.tls.enabled=true for https scrapes, or keep scheme=http)" }}
{{- end }}
{{- if and (ne .Values.metrics.serviceMonitor.scheme "https") .Values.metrics.serviceMonitor.tlsConfig }}
{{- fail "metrics.serviceMonitor.tlsConfig requires metrics.serviceMonitor.scheme=https" }}
{{- end }}
# OPS-005/RUNOPS-004: scrape probectl's /metrics with the Prometheus Operator.
# The ServiceMonitor endpoint must match the rendered control listener; strict
# profiles use app-terminated HTTPS instead of a documented-but-missing sidecar.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "probectl.fullname" . }}
  labels:
    {{- include "probectl.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "probectl.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: {{ include "probectl.servicePortName" . }}
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      scheme: {{ .Values.metrics.serviceMonitor.scheme }}
      {{- with .Values.metrics.serviceMonitor.tlsConfig }}
      tlsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
