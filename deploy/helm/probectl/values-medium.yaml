# MEDIUM reference values — production, fixed scale.
#
#   helm install probectl deploy/helm/probectl -f deploy/helm/probectl/values-medium.yaml ...
#
# A PodDisruptionBudget so node drains / the S34 rolling upgrade keep the control
# plane available. NetworkPolicy is already enabled by the base chart with API
# ingress restricted to the ingress-controller namespace; set egressTo for your
# datastore/bus/IdP/feed allow-list.
#
# READ COHERENCE (RESIL-004): the medium reference now runs multiple
# control-plane replicas. Pure in-RAM read models (/v1/results/latest,
# /v1/tls/posture, topology, endpoint) use per-replica bus fan-in, so every pod
# receives the full stream and answers the same query. Threat detections are
# served from the tenant-scoped durable incident_signals table instead of
# per-replica RAM. Data-tier throughput still scales independently in Kafka,
# ClickHouse, and the TSDB.

replicaCount: 3

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

# Keep the control plane available during voluntary disruptions (zero-downtime
# upgrades, S34). With three replicas, two pods remain available during
# voluntary disruption.
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Spread replicas across nodes for availability (applies once you scale up).
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: probectl

# NetworkPolicy is ON by default (U-086/WIRE-002). API ingress is already limited
# to the ingress-controller namespace; close the remaining allow-all egress hole
# by setting egressTo. values-large.yaml ships the filled reference shape:
#   networkPolicy:
#     ingressFrom:
#       - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } }
#     egressTo:
#       - to: [ { ipBlock: { cidr: 10.0.0.0/8 } } ]
#         ports: [ { protocol: TCP, port: 5432 } ]
