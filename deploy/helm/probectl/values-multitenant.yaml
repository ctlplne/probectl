# MULTI-TENANT / PROVIDER (MSP) reference overrides.
#
#   helm install probectl deploy/helm/probectl \
#     -f deploy/helm/probectl/values-multitenant.yaml \
#     --set ingress.host=probectl.msp.example --set database.url=...
#
# Same HTTPS-by-default posture as single-tenant; the difference is scale +
# provider operation. Tenant isolation (RLS / pooled scoping) is enforced by the
# control plane regardless of deployment shape — this file only sizes the runtime.

replicaCount: 3

control:
  authMode: session      # provider deployments always use real SSO
  # AIRCA-003: in a multi-tenant/MSP deployment, mask hostnames before any
  # prompt egresses to a remote LLM (a tenant's internal hostnames are
  # sensitive across the shared platform). Single-tenant keeps the default
  # (false) where hostnames are usually the question's subject; here we close
  # the egress hole by default. Override only with explicit tenant consent.
  extraEnv:
    PROBECTL_AI_REDACT_HOSTNAMES: "true"

# Keep a quorum during the S34 rolling upgrade / node drains.
podDisruptionBudget:
  enabled: true
  minAvailable: 2

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# Spread replicas across nodes for availability.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: probectl

ingress:
  enabled: true
  className: nginx
  # Per-tenant white-label hostnames are layered on by the provider plane (S-T4);
  # this is the provider/admin entry host.
  host: probectl.msp.example.com
  tlsSecretName: probectl-msp-tls
