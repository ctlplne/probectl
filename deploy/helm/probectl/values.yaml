# Default values for probectl — SINGLE-TENANT (sovereign) reference.
#
# HTTPS-by-default: the ingress terminates TLS and sets HSTS; the Service is
# ClusterIP (no plaintext API is exposed externally), and the default
# NetworkPolicy allows the plaintext in-cluster API hop only from the named
# ingress-controller namespace. See values-multitenant.yaml for the MSP /
# provider reference.

image:
  repository: ghcr.io/imfeelingtheagi/probectl-control
  tag: ""                # defaults to .Chart.AppVersion when empty
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

replicaCount: 1

# Apply database migrations from an init container before the server starts.
migrateOnBoot: true

control:
  # Identity mode: "session" (real OIDC SSO — set oidc.* below) or "dev"
  # (all-access; NEVER in production).
  authMode: session
  logFormat: json
  logLevel: info
  # RFC 9116 disclosure contact served at /.well-known/security.txt.
  securityContact: "mailto:security@your-org.example"
  # Direct HTTPS listener for regulated profiles. When enabled, the same control
  # process serves TLS on service.port; Service, probes, ingress backend, and
  # ServiceMonitor all switch to the named "https" target. Provide a Secret with
  # tls.crt/tls.key or override certKey/keyKey to match your Secret.
  tls:
    enabled: false
    existingSecret: ""
    certKey: tls.crt
    keyKey: tls.key
    mountPath: /etc/probectl/http-tls
  # Extra PROBECTL_* env vars, as a map of name: value.
  extraEnv: {}

oidc:
  issuer: ""
  clientId: ""
  # The secret is stored in the chart Secret (or supply via existingSecret).
  clientSecret: ""
  redirectUrl: ""

# Secret material. Prefer existingSecret in production (managed externally).
secrets:
  # Name of a pre-created Secret holding PROBECTL_ENVELOPE_KEY,
  # PROBECTL_SESSION_HMAC_KEY, PROBECTL_DATABASE_URL, and optionally
  # PROBECTL_OIDC_CLIENT_SECRET. When set, the chart does NOT create its own.
  existingSecret: ""
  # base64-encoded 32-byte envelope KEK (openssl rand -base64 32). Required.
  envelopeKey: ""
  # hex-encoded 32-byte session-token HMAC key (openssl rand -hex 32). Required.
  sessionHMACKey: ""

# At-rest encryption is REQUIRED by default (SEC-002): the chart refuses to
# template without the required keys, and the control plane refuses to start
# keyless (TENANT-106 fail-closed). Bulk telemetry volumes (Postgres,
# ClickHouse, object store) are encrypted by the OPERATOR's storage layer —
# see docs/hardening.md and `probectl-control preflight --strict`.
requireAtRestEncryption: true

# SEC-009/WIRE-002: the deployment edge (ingress) serves TLS, so session/OAuth
# cookies carry the Secure attribute even though the in-cluster listener is
# plaintext behind it. NetworkPolicy restricts that plaintext pod hop to the
# ingress controller by default. Only set false for a cluster-internal eval with
# no TLS anywhere.
publicTLS: true

# WIRE-004/WIRE-002: the chart's in-cluster listener is plaintext behind the
# ingress; the binary refuses non-loopback plaintext without this explicit
# opt-in, and the chart refuses an enabled NetworkPolicy with no ingress source
# selector.
allowPlaintextHTTP: true

# Kafka bus tls policy (optional; PROBECTL_BUS_MODE=kafka): production runs the
# broker hop over TLS — plaintext kafka is refused by the control plane unless
# the explicit dev-only PROBECTL_BUS_ALLOW_PLAINTEXT=true is set (U-010).
# Wire via control.extraEnv, e.g.:
#   PROBECTL_BUS_MODE: kafka
#   PROBECTL_BUS_BROKERS: kafka-0.kafka:9093
#   PROBECTL_BUS_TLS_ENABLED: "true"
#   PROBECTL_BUS_TLS_CA_FILE: /etc/probectl/kafka-ca.crt   # mounted CA bundle
#   PROBECTL_BUS_SASL_MECHANISM: scram-sha-512
#   PROBECTL_BUS_SASL_USER: probectl
#   PROBECTL_BUS_SASL_PASSWORD: vault:kafka/probectl#password  # S41 secret ref

database:
  # Full DSN — REQUIRED. No default credential ships (OPS-001): rendering fails
  # closed unless you set this (or secrets.existingSecret). Point at your managed
  # Postgres. TLS in transit is expected in production (sslmode=require), e.g.:
  #   --set database.url='postgres://probectl:<STRONG_PASSWORD>@host:5432/probectl?sslmode=require'
  url: ""

service:
  type: ClusterIP        # never NodePort/LoadBalancer with a plaintext port
  port: 8080

# HTTPS-by-default ingress. TLS is terminated here; HSTS is set; HTTP is
# redirected to HTTPS. No plaintext API is exposed.
ingress:
  enabled: true
  className: nginx
  host: probectl.example.com
  # TLS secret holding the cert for `host`. Use cert-manager (annotations below)
  # or pre-create the secret. HTTPS-by-default requires this to be set.
  tlsSecretName: probectl-tls
  hstsMaxAge: 31536000
  # Extra annotations merged into the Ingress. The TLS-redirect + HSTS
  # annotations are HARDCODED in the template (secure-by-default) — do not
  # repeat them here: duplicate map keys are invalid YAML and the
  # kubeconform gate rejects the render.
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Hardened pod/container security context (non-root, read-only root FS). The
# image is distroless `nonroot` (uid/gid 65532), so we pin the numeric ids too —
# pod admission (restricted PSS) and many policy engines require an explicit
# runAsUser, not just runAsNonRoot.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

serviceAccount:
  create: true
  name: ""
  # The control plane needs no Kubernetes API access — don't mount the token.
  automountServiceAccountToken: false

# PodDisruptionBudget keeps a quorum available during voluntary disruptions (node
# drains, the S34 rolling upgrade). Enable it whenever replicaCount > 1 — the M/L
# reference values do.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1   # set one OR the other, not both

# HorizontalPodAutoscaler. When enabled the Deployment's replicas field is omitted
# so the HPA owns scaling.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

# NetworkPolicy: default-deny ingress + egress, with explicit allows. ON by
# default (U-086/WIRE-002). The policy below closes the plaintext API pod hop by
# allowing ingress only from the named ingress-controller namespace. It still
# carries one DOCUMENTED HOLE until you tighten egress per deployment:
#   HOLE: egressTo EMPTY ⇒ all egress is allowed (plus DNS, always allowed).
#           Set the datastore/bus/IdP/feed allow-list to close it —
#           values-large.yaml ships a filled reference list.
# Requires a CNI that enforces NetworkPolicy (Calico/Cilium/...); without one
# the object is inert. Set enabled: false only with an equivalent external
# control (and note it in your hardening review).
networkPolicy:
  enabled: true
  # Sources allowed to reach the API on the container port. This must stay
  # non-empty when networkPolicy.enabled=true; the template fails closed if it
  # is empty. Adjust the namespace label to your ingress controller.
  ingressFrom:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
  # Egress beyond DNS (which is always allowed): the Postgres/bus/IdP/SIEM/feeds
  # this deployment must reach. EMPTY ⇒ the HOLE above (allow-all egress); see
  # values-large.yaml for the filled reference allow-list.
  egressTo: []
    # - to:
    #     - ipBlock: { cidr: 10.0.0.0/8 }
    #   ports:
    #     - { protocol: TCP, port: 5432 }

# Spread + scheduling. M/L reference values set anti-affinity / spread for HA.
topologySpreadConstraints: []
nodeSelector: {}
tolerations: []
affinity: {}

# OPS-005: Prometheus self-metrics (/metrics on the control plane). The
# endpoint is process/aggregate health only — never tenant data — so it is
# served unauthenticated like /healthz; scrape access is scoped at the
# NetworkPolicy + ServiceMonitor layer (see values-strict.yaml).
metrics:
  serviceMonitor:
    # Requires the Prometheus Operator CRDs. Off by default (no CRDs ⇒ the
    # object would not apply); regulated profiles enable it.
    enabled: false
    interval: 30s
    # Must match the rendered Service target: http by default, https when
    # control.tls.enabled=true.
    scheme: http
    labels: {}
    tlsConfig: {}
  prometheusRule:
    # OPS-004: opt-in self-alert pack for the same process/cluster metrics the
    # ServiceMonitor scrapes. Off by default because PrometheusRule is also a
    # Prometheus Operator CRD; regulated profiles enable it.
    enabled: false
    labels: {}
    runbookBaseURL: https://github.com/imfeelingtheagi/probectl/blob/main/docs/runbooks/probectl-self-alerts.md
    thresholds:
      noSelfMetricsFor: 5m
      highGoroutines: 5000
      highGoroutinesFor: 10m
      highMemoryBytes: 4294967296 # 4 GiB process sys memory
      highMemoryFor: 10m
      writesPausedFor: 2m
      replicaLagSeconds: 30
      replicaLagFor: 5m
      dlqGrowthWindow: 5m
      dlqGrowthEvents: 0
      dlqGrowthFor: 2m
      busErrorWindow: 5m
      busErrorEvents: 0
      busErrorFor: 2m
      clickhouseFailureWindow: 5m
      clickhouseFailureEvents: 0
      clickhouseFailureFor: 2m
      agentDarkFleetFraction: 0.25
      agentDarkFleetFor: 10m
      fairnessWindow: 5m
      fairnessEvents: 0
      fairnessFor: 5m
      wormExportGapSeconds: 7200 # 2h; default WORM export cadence is 1h
      wormExportGapFor: 10m
      wormVerifyFailureWindow: 5m
      wormVerifyFailures: 0
      wormVerifyFailureFor: 2m

# OPS-009: chart-managed PG + CH backup CronJobs (folded in from
# deploy/backup/, U-030). OFF by default — opt in, then supply the
# credentials secret (and either an existing backups PVC or persistence.create).
backup:
  enabled: false
  # Secret holding username/password (Postgres) and ch-username/ch-password
  # (ClickHouse). Operator-provided.
  credentialsSecret: probectl-db-credentials
  # OPS-002: envelope-encrypt the Postgres dump in-pipe (probectl-control
  # backup-seal) so plaintext never touches the backups volume. The KEK is
  # the SAME deployment envelope key (Sprint 8) — restore on a fresh node
  # only needs it. ClickHouse server-side backups encrypt via the backups
  # VOLUME (docs/hardening.md §0c), not this pipe.
  encryption:
    enabled: true
    keySecret: probectl-secrets       # secret holding the envelope KEK
    keySecretKey: PROBECTL_ENVELOPE_KEY # base64 KEK under this key
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: "1", memory: 512Mi }
  persistence:
    create: false       # true ⇒ the chart creates the backups PVC
    claimName: ""        # else point at an existing PVC (default: <release>-backups)
    size: 50Gi
    storageClass: ""
  postgres:
    enabled: true
    schedule: "0 2 * * *"
    host: probectl-postgres
    database: probectl
    image: postgres:16@sha256:4b7183ac05f8ef417db21fd72d71047a4238340c261d3cc3ddb6d579ab5071ae # digest-pinned (U-061)
  clickhouse:
    enabled: true
    # Telemetry regional DR profile: off-region backup. With the shipped
    # nightly schedule below, ClickHouse telemetry RPO is <=24h plus the time it
    # takes your backup controller to copy this .zip and .sha256 to encrypted
    # off-region storage. Tighten this schedule or use ClickHouse incrementals
    # for a smaller telemetry RPO; this is separate from Postgres metadata RPO.
    schedule: "30 2 * * *"
    host: probectl-clickhouse
    database: probectl
    serverBackupPath: /backups # path on the ClickHouse server, not this CronJob pod
    image: clickhouse/clickhouse-server:24.8@sha256:1ffa82edee000a42c09313bd9f1293d94c570aee74babc1b3ca9983a35fa597b # digest-pinned (U-061)

# OPS-007: one-shot restore Job. OFF by default — set enabled=true and
# backupFile to the sealed dump on the backups PVC, `helm upgrade`, then delete
# the Job. Uses the same credentials + envelope key as the backup CronJobs.
restore:
  enabled: false
  backupFile: ""              # filename on the backups PVC (e.g. pg-2026-06-13.sql.sealed)
  host: probectl-postgres
  database: probectl
  image: ""                   # SUPPLY-006: defaults to the digest-pinned backup.postgres.image
  # OPS-007: chart-managed ClickHouse restore (mirrors the PG restore Job and the
  # CH backup CronJob). Set clickhouse.enabled=true and clickhouse.backupFile to
  # the BACKUP-produced .zip on the ClickHouse SERVER's backup path. The RESTORE
  # runs SERVER-SIDE (clickhouse-client RESTORE DATABASE ... FROM File(...)),
  # exactly like the CronJob's BACKUP — no envelope filter (the CH backups volume
  # is encrypted at rest per docs/hardening.md §0c). DESTRUCTIVE: the database is
  # dropped first.
  clickhouse:
    enabled: false
    backupFile: ""            # filename on the ClickHouse server backup path (e.g. clickhouse-probectl-...zip)
    serverBackupPath: /backups # path on the ClickHouse server, not the restore Job pod
    host: probectl-clickhouse
    database: probectl
    image: ""                 # defaults to backup.clickhouse.image
